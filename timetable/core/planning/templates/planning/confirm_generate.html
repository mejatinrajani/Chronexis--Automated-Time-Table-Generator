<!DOCTYPE html>
<html>
<head>
    <title>Generate Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Generate Timetable</h4>
            </div>
            <div class="card-body">
                <h5>Session: {{ session.name }}</h5>
                <p class="text-muted">
                    Program: {{ session.program.name }}<br>
                    Semester: {{ session.semester }}
                </p>
                
                <div class="alert alert-warning">
                    <strong>Warning:</strong> This will overwrite any existing timetable entries for this session.
                    The process might take 10-30 seconds depending on the complexity.
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Start Generator Engine
                        </button>
                        <a href="/admin/planning/planningsession/" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
